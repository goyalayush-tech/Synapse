# =============================================================================
# Rust Toolchain Configuration
# =============================================================================
# Pins the Rust version for reproducible builds across all contributors.
# Update this when adopting new language features or edition changes.

[toolchain]
channel = "stable"
components = ["rustfmt", "clippy", "rust-analyzer"]
targets = ["x86_64-pc-windows-msvc", "x86_64-unknown-linux-gnu"]
