<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Synapse Admin{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/htmx.min.js" defer></script>
</head>
<body>
    <div class="layout">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="logo">
                <h1>⚡ Synapse</h1>
                <span class="version">v0.4.0</span>
            </div>
            <ul class="nav-menu">
                <li><a href="/" class="{% block nav_dashboard %}{% endblock %}">📊 Dashboard</a></li>
                <li><a href="/tenants" class="{% block nav_tenants %}{% endblock %}">👥 Tenants</a></li>
                <li><a href="/audit" class="{% block nav_audit %}{% endblock %}">📜 Audit Log</a></li>
                <li><a href="/backups" class="{% block nav_backups %}{% endblock %}">💾 Backups</a></li>
                <li><a href="/settings" class="{% block nav_settings %}{% endblock %}">⚙️ Settings</a></li>
            </ul>
            <div class="nav-footer">
                <a href="/api/health" target="_blank">API Health</a>
            </div>
        </nav>
        
        <!-- Main Content -->
        <main class="content">
            <header class="topbar">
                <h2>{% block page_title %}Dashboard{% endblock %}</h2>
                <div class="topbar-actions">
                    {% block topbar_actions %}{% endblock %}
                </div>
            </header>
            
            <div class="main-content">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>
    
    {% block scripts %}{% endblock %}
</body>
</html>
